name: build-cybereason-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to repackage (e.g. v1.0.0)'
        required: true
        type: string

# Least privilege at the workflow level; the job widens only what it needs.
permissions:
  contents: read

# Serialize per-tag so two runs cannot push the same ghcr reference at once.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag }}
  cancel-in-progress: false

env:
  DOCKER_IMAGE: ghcr.io/cybereason-public/owlsm-ci:latest

jobs:
  build-cybereason-release:
    name: Build Cybereason Release
    runs-on: ["OCI", "owLSM"]
    permissions:
      contents: read
      packages: write
    steps:
      # ---------------------------------------------------------------
      # (a) Checkout
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5

      # ---------------------------------------------------------------
      # Validate the tag input and derive the version (strip leading 'v')
      # ---------------------------------------------------------------
      - name: Validate input and resolve metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must match vX.Y.Z format, got '$TAG'"
            exit 1
          fi

          VERSION="${TAG#v}"
          ASSET="owlsm-${VERSION}.tar.gz"

          echo "tag=$TAG"                              >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                      >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET"                          >> "$GITHUB_OUTPUT"
          echo "out_tarball=owlsm-${VERSION}-cybereason.tar.gz" >> "$GITHUB_OUTPUT"
          echo "artifact_name=owlsm-${VERSION}-cybereason"      >> "$GITHUB_OUTPUT"
          echo "ghcr_ref=ghcr.io/cybereason-public/owlsm-cybereason:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG | Version: $VERSION | Asset: $ASSET"

      # ---------------------------------------------------------------
      # (b) Validate the release tag exists AND the asset is present
      # ---------------------------------------------------------------
      - name: Verify release and asset exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ASSET="${{ steps.meta.outputs.asset }}"
          REPO="${{ github.repository }}"

          echo "==> Verifying tag $TAG exists on remote..."
          git ls-remote --exit-code --tags origin "refs/tags/${TAG}" || {
            echo "::error::Tag ${TAG} does not exist on remote. Publish the official release first."
            exit 1
          }

          echo "==> Verifying release $TAG exists in $REPO..."
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 || {
            echo "::error::Release ${TAG} not found in ${REPO}. Run 'Publish GitHub Release' first."
            exit 1
          }

          echo "==> Verifying asset $ASSET is attached to release $TAG..."
          ASSET_FOUND=$(gh release view "$TAG" --repo "$REPO" \
            --json assets --jq ".assets[] | select(.name == \"${ASSET}\") | .name")
          if [ -z "$ASSET_FOUND" ]; then
            echo "::error::Asset ${ASSET} not found on release ${TAG}."
            exit 1
          fi
          echo "==> Found asset: $ASSET_FOUND"

      # ---------------------------------------------------------------
      # (c) Pull the CI docker image
      # ---------------------------------------------------------------
      - name: Pull CI Docker image
        run: |
          echo "Pulling Docker image: ${{ env.DOCKER_IMAGE }}"
          docker pull ${{ env.DOCKER_IMAGE }}

      # ---------------------------------------------------------------
      # (d) Build convert_company_rules inside the CI image so the binary
      #     is glibc/arch-compatible with the official release binaries.
      # ---------------------------------------------------------------
      - name: Build convert_company_rules binary
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ env.DOCKER_IMAGE }} \
            bash -c "
              set -e
              echo '==> Building convert_company_rules...'
              bash scripts/CR_rules/build_convert_company_rules.sh
              echo '==> Build completed!'
              ls -l scripts/CR_rules/convert_company_rules
            "

      # ---------------------------------------------------------------
      # (e) Download the official release asset (clean subdir first)
      # ---------------------------------------------------------------
      - name: Download official release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ASSET="${{ steps.meta.outputs.asset }}"

          rm -rf release-download
          mkdir -p release-download
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "$ASSET" \
            --dir release-download
          echo "==> Downloaded:"
          ls -lh release-download

      # ---------------------------------------------------------------
      # (f) Extract the tarball (yields a top-level owlsm/ dir)
      # ---------------------------------------------------------------
      - name: Extract release tarball
        run: |
          ASSET="${{ steps.meta.outputs.asset }}"
          rm -rf extract
          mkdir -p extract
          tar -xzf "release-download/${ASSET}" -C extract
          echo "==> Extracted layout:"
          ls -l extract/owlsm

      # ---------------------------------------------------------------
      # (g) Copy the freshly built binary into owlsm/bin
      # ---------------------------------------------------------------
      - name: Add convert_company_rules binary
        run: |
          cp scripts/CR_rules/convert_company_rules extract/owlsm/bin/convert_company_rules
          chmod +x extract/owlsm/bin/convert_company_rules
          ls -l extract/owlsm/bin/convert_company_rules

      # ---------------------------------------------------------------
      # (h) Copy the field_mapping.yml resource
      # ---------------------------------------------------------------
      - name: Add field_mapping.yml resource
        run: |
          cp scripts/CR_rules/field_mapping.yml extract/owlsm/resources/field_mapping.yml
          ls -l extract/owlsm/resources/field_mapping.yml

      # ---------------------------------------------------------------
      # (i) Repack so the internal layout matches the official tarball
      # ---------------------------------------------------------------
      - name: Repack Cybereason tarball
        run: |
          OUT="${{ steps.meta.outputs.out_tarball }}"
          tar -czf "$OUT" -C extract owlsm
          echo "==> Repacked:"
          ls -lh "$OUT"

      # ---------------------------------------------------------------
      # (j) Install ORAS and push the tarball permanently to ghcr.io
      # ---------------------------------------------------------------
      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Push artifact to GHCR with ORAS
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUT="${{ steps.meta.outputs.out_tarball }}"
          REF="${{ steps.meta.outputs.ghcr_ref }}"

          # Token via stdin, never echoed to the logs.
          echo "$REGISTRY_PASSWORD" | oras login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

          oras push "$REF" \
            --artifact-type "application/vnd.cybereason.owlsm.release.layer.v1+tar" \
            "${OUT}:application/vnd.cybereason.owlsm.release.layer.v1+tar"

          # Drop cached credentials.
          oras logout ghcr.io || true

      # ---------------------------------------------------------------
      # (k) Surface results in the UI and as job outputs
      # ---------------------------------------------------------------
      - name: Summary
        id: summary
        run: |
          ARTIFACT_NAME="${{ steps.meta.outputs.artifact_name }}"
          OUT="${{ steps.meta.outputs.out_tarball }}"
          REF="${{ steps.meta.outputs.ghcr_ref }}"
          PKG_URL="https://github.com/orgs/Cybereason-Public/packages/container/package/owlsm-cybereason"

          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "tarball=$OUT"                 >> "$GITHUB_OUTPUT"
          echo "ghcr_ref=$REF"                >> "$GITHUB_OUTPUT"
          echo "package_url=$PKG_URL"         >> "$GITHUB_OUTPUT"

          {
            echo "## Cybereason Release Published"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Artifact | $ARTIFACT_NAME |"
            echo "| Tarball | $OUT |"
            echo "| GHCR reference | \`$REF\` |"
            echo "| Pull command | \`oras pull $REF\` |"
            echo "| Package page | $PKG_URL |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # (l) Cleanup workspace (mirrors build-artifacts)
      # ---------------------------------------------------------------
      - name: Cleanup workspace
        if: always()
        run: |
          echo "==> Cleaning up workspace..."
          docker rmi ${{ env.DOCKER_IMAGE }} || true
          cd ${{ github.workspace }}
          sudo git clean -ffdx
          echo "==> Cleanup completed!"

    outputs:
      artifact_name: ${{ steps.summary.outputs.artifact_name }}
      tarball: ${{ steps.summary.outputs.tarball }}
      ghcr_ref: ${{ steps.summary.outputs.ghcr_ref }}
      package_url: ${{ steps.summary.outputs.package_url }}
