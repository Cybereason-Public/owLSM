name: PR Approval Gate

# =============================================================================
# Lightweight gate workflow triggered by PR review submission.
# No secrets required. Its sole purpose is to complete successfully when
# a PR is approved, so that the "Build Artifact Full Lifecycle" workflow
# can be triggered via workflow_run in the base-repo context (which has
# access to secrets — even for fork PRs).
# =============================================================================

on:
  pull_request_review:
    types:
      - submitted
    branches:
      - 'main'

jobs:
  gate:
    name: Record PR Approval
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Log approval
        run: |
          echo "PR #${{ github.event.pull_request.number }} approved by ${{ github.event.review.user.login }}"
          echo "Head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "From fork: ${{ github.event.pull_request.head.repo.full_name != github.repository }}"
