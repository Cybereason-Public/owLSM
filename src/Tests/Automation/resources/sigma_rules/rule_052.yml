# Field mapping automation test rule.
# Uses all 3 custom sigma fields from field_mapping.yml (2 map to the same owLSM destination).
# ALLOW_EVENT, unlikely to match any real runtime event.

id: 52
description: "Field mapping automation test - uses all 3 custom field mappings"
action: "ALLOW_EVENT"
events:
    - EXEC
detection:
    selection:
        event.custom.path1|endswith: "/owlsm_test_nevermatch"
        event.custom.path2|contains: "owlsm_test_nevermatch"
        event.custom.name: "owlsm_test_nevermatch"
    condition: selection
